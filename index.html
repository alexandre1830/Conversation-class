<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hey, Teacher! — Conversation Cards</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/styles.css">
</head>
<body class="landing-page">

  <div class="bg-grid" aria-hidden="true"></div>

  <div class="landing-container">

    <header class="landing-header">
      <div class="logo">
        <span class="logo-cap" aria-hidden="true"><img src="images/logo.png" width="200px" alt="Hey, Teacher! Logo"></span>
      </div>
      <p class="select-prompt">Select a CEFR level to begin the conversation.</p>
    </header>

    <main class="levels-grid" id="levels-grid" role="list" aria-label="CEFR levels">
      <!-- Generated by app.js -->
    </main>

    <footer class="landing-footer">
      <p>Hey, Teacher!™</p>
    </footer>

  </div>

  <script src="scripts/app.js"></script>
</body>
</html>
