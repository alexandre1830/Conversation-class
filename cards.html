<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hey, Teacher!</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/styles.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js" defer></script>
</head>
<body class="cards-page">

  <div class="bg-grid" aria-hidden="true"></div>

  <header class="cards-header">
    <a href="index.html" class="back-btn" aria-label="Back to level selection">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M19 12H5M5 12l7-7M5 12l7 7"/>
      </svg>
      Back
    </a>

    <div class="level-info">
      <span class="level-badge" id="level-badge">A1</span>
      <span class="level-name" id="level-name">Beginner</span>
    </div>

    <div class="header-actions">
      <span class="progress-counter" id="progress-counter" aria-live="polite">0 / 30</span>
      <button class="header-btn export-btn" id="export-btn" aria-label="Export answers as PDF">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        <span>Export PDF</span>
      </button>
      <button class="header-btn reset-btn" id="reset-btn" aria-label="Reset all cards and notes">Reset All</button>
    </div>
  </header>

  <main class="cards-grid" id="cards-grid" aria-label="Conversation question cards">
    <!-- Generated by app.js -->
  </main>

  <!-- ─── Spotlight overlay ─── -->
  <div class="spotlight" id="spotlight" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="spotlight-q">
    <button class="spotlight-nav prev" id="spotlight-prev" aria-label="Previous question">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M15 18l-6-6 6-6"/>
      </svg>
    </button>

    <div class="spotlight-card">
      <div class="spotlight-header">
        <span class="spotlight-num" id="spotlight-num">1</span>
        <button class="spotlight-close" id="spotlight-close" aria-label="Close">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 6L6 18M6 6l12 12"/>
          </svg>
        </button>
      </div>

      <p class="spotlight-q" id="spotlight-q">&nbsp;</p>

      <div class="spotlight-meta">
        <span class="spotlight-tag" id="spotlight-tag">topic</span>
        <button type="button" class="spotlight-review" id="spotlight-review" aria-pressed="false" aria-label="Toggle review flag">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/>
            <line x1="4" y1="22" x2="4" y2="15"/>
          </svg>
          <span class="spotlight-review-text">Review</span>
        </button>
      </div>

      <div class="spotlight-notes">
        <div class="spotlight-notes-head">
          <label for="spotlight-textarea" class="spotlight-notes-label">Notes</label>
          <span class="spotlight-saved" id="spotlight-saved" aria-live="polite">Saved</span>
        </div>
        <textarea
          id="spotlight-textarea"
          class="spotlight-textarea"
          placeholder="Type…"
          rows="4"
          spellcheck="true"></textarea>
      </div>
    </div>

    <button class="spotlight-nav next" id="spotlight-next" aria-label="Next question">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 18l6-6-6-6"/>
      </svg>
    </button>
  </div>

  <script src="scripts/app.js"></script>
</body>
</html>
